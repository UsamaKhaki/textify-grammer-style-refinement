name: Textify
options:
  bundleIdPrefix: com.textify
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: NO

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.2.0"

targets:
  Textify:
    type: application
    platform: macOS
    sources:
      - Textify
    info:
      path: Textify/Info.plist
      properties:
        LSUIElement: true
        CFBundleName: Textify
        CFBundleDisplayName: Textify
        NSHumanReadableCopyright: ""
    dependencies:
      - package: KeyboardShortcuts
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.textify.Textify
        GENERATE_INFOPLIST_FILE: NO

  TextifyTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - TextifyTests
    dependencies:
      - target: Textify
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Textify.app/Contents/MacOS/Textify"
        GENERATE_INFOPLIST_FILE: YES
